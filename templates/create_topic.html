<!DOCTYPE html>
<html>
<head>
    <title>Create Topic</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <div class="brand">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" class="logo">
        <h2>Queensgate Capital</h2>
    </div>
</div>

<div class="container">

    <div class="footer-links">
        <a href="/">⬅ Back</a>
    </div>
</div>

</body>
</html>
