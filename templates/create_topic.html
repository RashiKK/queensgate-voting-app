<!DOCTYPE html>
<html>
<head>
    <title>Create Topic</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <div class="brand">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" class="logo">
        <h2>Queensgate Capital</h2>
    </div>
</div>

<div class="container">

    <h1>Create Voting Topic</h1>

    <form method="POST">

        <label>Topic Title</label>
        <input type="text" name="title" required>

        <br><br>

        <h2>Select Allowed Voters</h2>

        {% for voter in voters %}

            <div style="margin-bottom:10px;">

                <input
                    type="checkbox"
                    name="allowed_voters"
                    value="{{ voter.email }}"
                >

                {{ voter.name }}
                ({{ voter.email }})
                - Voting Power: {{ voter.voting_power }}

            </div>

        {% endfor %}

        <br>

        <button type="submit">
            Create Topic
        </button>

    </form>

</div>

</body>
</html>
